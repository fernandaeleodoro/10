<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Adoção</title>
</head>

<body>

<h2>Formulário de Adoção</h2>

<form id="formAdocao">

<label>Nome completo:</label>
<input type="text" id="nome"><br>

<label>Email:</label>
<input type="email" id="email"><br>

<label>Telefone:</label>
<input type="text" id="telefone"><br>

<label>CPF:</label>
<input type="text" id="cpf"><br>

<label>Idade:</label>
<input type="number" id="idade"><br>

<label>Cidade:</label>
<input type="text" id="cidade"><br>

<label>Tipo de moradia:</label>
<select id="moradia">
<option value="">Selecione</option>
<option value="casa">Casa</option>
<option value="apartamento">Apartamento</option>
</select><br>

<label>Possui quintal?</label>
<input type="radio" name="quintal" value="sim">Sim
<input type="radio" name="quintal" value="nao">Não<br>

<label>Já teve pet?</label>
<input type="radio" name="pet" value="sim">Sim
<input type="radio" name="pet" value="nao">Não<br>

<label>Horas sozinho por dia:</label>
<input type="number" id="horas"><br>

<label>Motivo da adoção:</label>
<textarea id="motivo"></textarea><br>

<label>
<input type="checkbox" id="termo"> Aceito o termo de responsabilidade
</label><br>

<button type="submit">Enviar</button>

</form>

<div id="resultado"></div>

<script src="script.js"></script>

</body>
</html>
