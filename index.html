<form id="formAdocao">

<input type="text" id="telefone">

</select>

</div>

</div>

<label>Horas sozinho por dia:</label>
<input type="number" id="horas">

<label>Motivo da adoção:</label>
<textarea id="motivo"></textarea>

<label>
<input type="checkbox" id="termo"> Aceito o termo de responsabilidade
</label>

<button type="submit">Enviar</button>

</form>

<div id="resultado"></div>

</div>
